name: Create GitHub Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            echo "Release $TAG_NAME already exists."
            exit 0
          fi

          cat > release-notes.md <<'EOF'
          This release archives the public Simulation Helper Skill for Eclipse SUMO package for reproducible citation and Zenodo deposition.

          Included:
          - Codex/Claude skill packages for SUMO/TraCI experiment planning, auditing, debugging, and claim-boundary review.
          - Multilingual README pages with the current visual identity.
          - GitHub Pages site assets, including the banner and app logo.
          - Examples and reference modules for traffic-signal control experiment audits.
          - CC BY 4.0 documentation license metadata and citation metadata.

          Scope:
          - Current focus: SUMO/TraCI traffic-signal control experiments.
          - Future scope: additional Eclipse SUMO workflows beyond signal control.

          This is an independent academic workflow resource and is not affiliated with, endorsed by, sponsored by, or maintained by the Eclipse Foundation, the Eclipse SUMO project, or DLR.
          EOF

          gh release create "$TAG_NAME" \
            --title "Simulation Helper Skill for Eclipse SUMO $TAG_NAME" \
            --notes-file release-notes.md
